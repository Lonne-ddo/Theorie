<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<title>Conspiracy Map</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--red:#e02020;--red2:#ff3333;--bg:#080808;--surface:#0f0f0f;--surface2:#161616;--border:#1e1e1e;--text:#e8e4e0;--muted:#3a3a3a;--muted2:#555}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}
#app{width:100vw;height:100vh;position:relative;display:flex}
#canvas{flex:1;position:relative;overflow:hidden}
svg{width:100%;height:100%;display:block}

/* Loading */
#loading{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s ease}
#loading.hidden{opacity:0;pointer-events:none}
.load-ring{width:48px;height:48px;border:1.5px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px}
.load-text{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:.12em;text-transform:uppercase}
.load-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em;margin-top:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
#header{position:absolute;top:20px;left:22px;z-index:10;pointer-events:none}
#logo{font-size:17px;font-weight:700;color:var(--red);letter-spacing:.06em}
#logo span{color:var(--text);opacity:.3}
#tagline{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:2px;letter-spacing:.1em;text-transform:uppercase}

/* Status bar */
#status-bar{position:absolute;top:20px;right:22px;display:flex;align-items:center;gap:10px;z-index:10}
#sync-status{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:.06em;display:flex;align-items:center;gap:5px}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.sync-dot.live{background:#22c55e;box-shadow:0 0 6px #22c55e88;animation:pulse-dot 2s infinite}
.sync-dot.loading{background:var(--red);animation:pulse-dot 1s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
#refresh-btn{width:28px;height:28px;border-radius:4px;background:transparent;border:0.5px solid var(--border);color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Space Mono',monospace}
#refresh-btn:hover{border-color:var(--red);color:var(--red)}
#refresh-btn.spinning{animation:spin .8s linear infinite}

/* Controls */
#controls{position:absolute;bottom:24px;left:22px;display:flex;flex-direction:column;gap:6px;z-index:10}
.ctrl-btn{width:32px;height:32px;border-radius:4px;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Space Mono',monospace}
.ctrl-btn:hover{background:var(--surface2);color:var(--red);border-color:var(--red)}

/* Add button */
#add-btn{position:absolute;bottom:24px;right:22px;width:40px;height:40px;border-radius:50%;background:var(--red);border:none;color:#fff;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .2s;box-shadow:0 0 20px rgba(224,32,32,.3)}
#add-btn:hover{transform:scale(1.1);box-shadow:0 0 30px rgba(224,32,32,.5)}

/* Panel */
#panel{width:0;overflow:hidden;background:var(--surface);border-left:0.5px solid var(--border);transition:width .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;flex-shrink:0;position:relative}
#panel.open{width:320px}
#panel-inner{padding:24px 20px;overflow-y:auto;height:100%;display:flex;flex-direction:column;gap:0}
#panel-bar{height:2px;border-radius:1px;margin-bottom:20px;transition:background .3s}
#panel-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:3px;line-height:1.2;color:var(--text)}
#panel-theme{font-size:9px;font-family:'Space Mono',monospace;margin-bottom:14px;text-transform:uppercase;letter-spacing:.12em;transition:color .3s}
#panel-desc{font-size:12px;line-height:1.85;color:#585450;margin-bottom:16px;border-left:1.5px solid var(--border);padding-left:12px}
#panel-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.ptag{padding:2px 8px;border-radius:2px;font-size:8px;font-weight:700;font-family:'Space Mono',monospace;background:var(--surface2);border:0.5px solid var(--border);color:var(--muted2);letter-spacing:.06em;text-transform:uppercase}
#panel-src{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;padding-top:12px;border-top:0.5px solid var(--border);margin-top:auto}
#panel-open-doc{display:none;margin-top:10px;padding:6px 12px;border-radius:3px;background:transparent;border:0.5px solid var(--border);color:var(--muted2);font-size:9px;font-family:'Space Mono',monospace;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;text-align:center;text-decoration:none}
#panel-open-doc:hover{border-color:var(--red);color:var(--red)}
#panel-close{position:absolute;top:12px;right:12px;width:22px;height:22px;border:0.5px solid var(--border);border-radius:2px;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center;font-family:'Space Mono',monospace;transition:all .15s}
#panel-close:hover{border-color:var(--red);color:var(--red)}
#panel.open~#panel-close{display:flex}

/* Hint */
#hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;z-index:10;text-align:center;line-height:2;letter-spacing:.06em;pointer-events:none;opacity:.5}

/* Tooltip */
#tooltip{position:fixed;background:var(--surface);border:0.5px solid rgba(224,32,32,.4);border-radius:2px;padding:4px 9px;font-size:9px;color:var(--red);pointer-events:none;opacity:0;transition:opacity .1s;z-index:100;font-family:'Space Mono',monospace;white-space:nowrap;letter-spacing:.06em}

/* Add Modal */
#modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
#modal-overlay.open{display:flex}
#modal{background:var(--surface);border:0.5px solid var(--border);border-radius:6px;padding:24px;width:340px;max-width:90vw;position:relative;animation:modal-in .2s ease}
@keyframes modal-in{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
#modal h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text)}
#modal p{font-size:10px;color:var(--muted2);font-family:'Space Mono',monospace;margin-bottom:18px;line-height:1.6}
.form-label{font-size:9px;color:var(--muted2);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}
#modal-doc{width:100%;padding:8px 10px;background:var(--surface2);border:0.5px solid var(--border);border-radius:3px;color:var(--text);font-size:11px;font-family:'Space Mono',monospace;margin-bottom:14px;cursor:pointer}
#modal-doc:focus{outline:none;border-color:var(--red)}
#modal-content{width:100%;padding:8px 10px;background:var(--surface2);border:0.5px solid var(--border);border-radius:3px;color:var(--text);font-size:11px;font-family:'Space Mono',monospace;resize:vertical;min-height:80px;line-height:1.6}
#modal-content:focus{outline:none;border-color:var(--red)}
.modal-footer{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.btn-cancel{padding:7px 14px;background:transparent;border:0.5px solid var(--border);border-radius:3px;color:var(--muted2);font-size:9px;font-family:'Space Mono',monospace;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.btn-cancel:hover{border-color:var(--muted2);color:var(--text)}
.btn-submit{padding:7px 14px;background:var(--red);border:none;border-radius:3px;color:#fff;font-size:9px;font-family:'Space Mono',monospace;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.btn-submit:hover{background:var(--red2)}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}
#modal-feedback{font-size:9px;font-family:'Space Mono',monospace;margin-top:8px;min-height:14px;text-align:right}

/* D3 nodes */
.node{cursor:pointer}
.node circle{transition:r .25s cubic-bezier(.4,0,.2,1)}
.node.entering{opacity:0}
.link{transition:stroke-opacity .3s}

@media(max-width:640px){
  #panel.open{width:100vw;position:absolute;top:0;right:0;z-index:50;height:100%}
  #hint{display:none}
  #modal{width:92vw}
}
</style>
</head>
<body>
<div id="app">
  <div id="canvas">
    <div id="loading">
      <div class="load-ring"></div>
      <div class="load-text">Loading conspiracy map</div>
      <div class="load-sub" id="load-sub-text">Connecting to knowledge base...</div>
    </div>
    <div id="header">
      <div id="logo">CONSPIRACY<span> //</span> MAP</div>
      <div id="tagline">Theory mapping tool</div>
    </div>
    <div id="status-bar">
      <div id="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">—</span></div>
      <button id="refresh-btn" onclick="refreshData()" title="Sync with Google Drive">↻</button>
    </div>
    <div id="controls">
      <button class="ctrl-btn" onclick="doZoom(1.35)" title="Zoom in">+</button>
      <button class="ctrl-btn" onclick="doZoom(0.74)" title="Zoom out">−</button>
      <button class="ctrl-btn" onclick="doReset()" title="Reset view">⊙</button>
    </div>
    <div id="hint">CLICK — EXPAND &nbsp;·&nbsp; DRAG — MOVE &nbsp;·&nbsp; SCROLL — ZOOM</div>
    <svg id="svg"></svg>
    <div id="tooltip"></div>
    <button id="add-btn" onclick="openModal()" title="Add new argument">+</button>
  </div>
  <div id="panel">
    <div id="panel-inner">
      <div id="panel-bar"></div>
      <div id="panel-title"></div>
      <div id="panel-theme"></div>
      <div id="panel-desc"></div>
      <div id="panel-tags"></div>
      <div id="panel-src"></div>
      <a id="panel-open-doc" target="_blank" rel="noopener">Open in Google Docs ↗</a>
    </div>
  </div>
  <button id="panel-close" onclick="closePanel()">×</button>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h3>Add new argument</h3>
    <p>This will be written directly to the<br>corresponding Google Doc.</p>
    <label class="form-label">Category</label>
    <select id="modal-doc">
      <option value="power">Power Structure</option>
      <option value="actors">Key Actors</option>
      <option value="cognitive">Cognitive Matrix</option>
      <option value="human">Attack on Humans</option>
      <option value="lockdown">World Lockdown</option>
      <option value="occult">Occult Dimension</option>
      <option value="methods">Recurring Methods</option>
      <option value="symbols">Symbolism</option>
    </select>
    <label class="form-label">Content</label>
    <textarea id="modal-content" placeholder="Describe the argument, fact or theory..."></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" id="submit-btn" onclick="submitArgument()">Add to Doc</button>
    </div>
    <div id="modal-feedback"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzF3q2HqF49UdZaNvDWKoqtVErWkX7QQAxULw6ZETPWrX6Um9H9X9PjWxVkbkxZBL7M1w/exec';
var AUTO_REFRESH = 5 * 60 * 1000;

var FALLBACK_THEMES = {
  'power':    {color:'#e02020',label:'Power Structure'},
  'actors':   {color:'#cc1818',label:'Key Actors'},
  'cognitive':{color:'#b01010',label:'Cognitive Matrix'},
  'human':    {color:'#e83030',label:'Attack on Humans'},
  'lockdown': {color:'#ff4444',label:'World Lockdown'},
  'occult':   {color:'#ff2222',label:'Occult Dimension'},
  'methods':  {color:'#c41a1a',label:'Recurring Methods'},
  'symbols':  {color:'#882020',label:'Symbolism'}
};

var NODES = [], LINKS = [], expanded = {}, gRoot, sim, zoom, lastUpdated = null;
var W = window.innerWidth, H = window.innerHeight;

function getColor(theme){ return theme && FALLBACK_THEMES[theme] ? FALLBACK_THEMES[theme].color : '#e02020'; }
function getLabel(theme){ return theme && FALLBACK_THEMES[theme] ? FALLBACK_THEMES[theme].label : 'Core'; }

function setStatus(state, text){
  var dot = document.getElementById('sync-dot');
  var txt = document.getElementById('sync-text');
  dot.className = 'sync-dot ' + state;
  txt.textContent = text;
}

function refreshData(){
  var btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setStatus('loading', 'Syncing...');
  loadData(function(ok){
    btn.classList.remove('spinning');
    if(ok){ setStatus('live', 'Live · ' + new Date().toLocaleTimeString()); }
    else { setStatus('', 'Offline — cached data'); }
  });
}

function loadData(cb){
  document.getElementById('load-sub-text').textContent = 'Reading Google Docs...';
  fetch(GAS_URL + '?action=all', {redirect:'follow'})
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.nodes && data.nodes.length > 0){
        NODES = data.nodes;
        LINKS = data.links || [];
        lastUpdated = data.lastUpdated;
        try{ localStorage.setItem('conspiracy_data', JSON.stringify({nodes:NODES,links:LINKS,lastUpdated:lastUpdated})); }catch(e){}
        initPositions();
        if(gRoot) rerender();
        if(cb) cb(true);
      } else {
        loadFallback();
        if(cb) cb(false);
      }
    })
    .catch(function(){
      loadFallback();
      if(cb) cb(false);
    });
}

function loadFallback(){
  try{
    var cached = localStorage.getItem('conspiracy_data');
    if(cached){ var d=JSON.parse(cached); NODES=d.nodes; LINKS=d.links; lastUpdated=d.lastUpdated; return; }
  }catch(e){}
  NODES = buildFallbackNodes();
  LINKS = buildFallbackLinks();
}

function buildFallbackNodes(){
  var ns = [{id:'center',label:'NEW WORLD\nORDER',type:'center',theme:null,color:'#e02020',desc:'Central concept: an alleged project by global elites to establish a single world government, reduce the population and control every aspect of human life.',tags:['NWO','WEF','AGENDA 2030'],src:'Local fallback'}];
  Object.keys(FALLBACK_THEMES).forEach(function(k){
    var t=FALLBACK_THEMES[k];
    ns.push({id:k,label:t.label.replace(' ','\n'),type:'main',theme:k,color:t.color,desc:'Click to expand. Add content via the + button.',tags:[],src:k});
  });
  return ns;
}
function buildFallbackLinks(){
  var ls=[];
  Object.keys(FALLBACK_THEMES).forEach(function(k){ ls.push({source:'center',target:k,ltype:'main'}); });
  return ls;
}

function initPositions(){
  var mains = NODES.filter(function(n){ return n.type==='main'; });
  var a = (2*Math.PI)/mains.length;
  mains.forEach(function(n,i){
    if(!n.x){ n.x=Math.cos(i*a-Math.PI/2)*210; n.y=Math.sin(i*a-Math.PI/2)*210; }
  });
  var c = NODES.find(function(n){ return n.id==='center'; });
  if(c&&!c.x){ c.x=0; c.y=0; }
}

function visData(){
  var vn = NODES.filter(function(n){ return n.type!=='sub'||expanded[n.parent]; });
  var ids = {}; vn.forEach(function(n){ ids[n.id]=true; });
  var vl = LINKS.filter(function(l){ return ids[l.source.id||l.source]&&ids[l.target.id||l.target]; });
  return {nodes:vn, links:vl};
}

function spawnSubNodes(parentId){
  var parent = NODES.find(function(n){ return n.id===parentId; });
  if(!parent) return;
  var subs = NODES.filter(function(n){ return n.parent===parentId; });
  var baseAngle = Math.atan2(parent.y||0, parent.x||0);
  var spread = Math.PI * 0.8;
  subs.forEach(function(s,i){
    var t = subs.length>1 ? i/(subs.length-1) : 0.5;
    var angle = baseAngle + (t-0.5)*spread;
    s.x = (parent.x||0) + Math.cos(angle)*90;
    s.y = (parent.y||0) + Math.sin(angle)*90;
    s.vx = 0; s.vy = 0;
  });
}

function rerender(){
  var d = visData();

  var lSel = gRoot.selectAll('line.link').data(d.links, function(l){ return (l.source.id||l.source)+'-'+(l.target.id||l.target); });
  var lEnter = lSel.enter().append('line').attr('class','link')
    .attr('stroke', function(l){
      var tid=l.target.id||l.target;
      var node=NODES.find(function(n){ return n.id===tid; });
      return node ? getColor(node.theme)+'50' : '#e0202030';
    })
    .attr('stroke-width', function(l){ return l.ltype==='sub'?.6:1.2; })
    .attr('stroke-opacity',0);
  lEnter.transition().duration(400).attr('stroke-opacity',1);
  lSel.exit().transition().duration(250).attr('stroke-opacity',0).remove();

  var nSel = gRoot.selectAll('g.node').data(d.nodes, function(n){ return n.id; });
  var enter = nSel.enter().append('g').attr('class','node entering')
    .call(d3.drag()
      .on('start',function(e,n){ if(!e.active) sim.alphaTarget(.3).restart(); n.fx=n.x; n.fy=n.y; })
      .on('drag', function(e,n){ n.fx=e.x; n.fy=e.y; })
      .on('end',  function(e,n){ if(!e.active) sim.alphaTarget(0); d3.select(this).transition().delay(1500).on('end',function(){ n.fx=null; n.fy=null; }); }))
    .on('click',function(e,n){ e.stopPropagation(); onClick(n); })
    .on('mouseover',function(e,n){ showTip(e,n); highlightNode(n.id,true); })
    .on('mouseout', function(e,n){ hideTip(); highlightNode(n.id,false); });

  enter.append('circle').attr('class','outer-circle')
    .attr('r',0)
    .attr('fill','#000')
    .attr('stroke', function(n){ return getColor(n.theme); })
    .attr('stroke-width', function(n){ return n.type==='center'?2:n.type==='main'?1.2:.7; })
    .attr('stroke-opacity', function(n){ return n.type==='sub'?.45:.85; })
    .transition().duration(500).ease(d3.easeBackOut.overshoot(1.2))
    .attr('r', function(n){ return n.type==='center'?56:n.type==='main'?34:19; });

  enter.append('circle').attr('class','inner-circle')
    .attr('r',0)
    .attr('fill', function(n){ return getColor(n.theme)+'12'; })
    .attr('stroke','none')
    .transition().duration(500).ease(d3.easeBackOut.overshoot(1.2))
    .attr('r', function(n){ return n.type==='center'?52:n.type==='main'?30:15; });

  enter.each(function(n){
    var g = d3.select(this);
    var lines = n.label.split('\n');
    var fs = n.type==='center'?11:n.type==='main'?10:8;
    var lh = 11;
    var col = n.type==='center'?'#e02020':'#c0bcb8';
    var totalH = (lines.length-1)*lh;
    lines.forEach(function(line,i){
      g.append('text').attr('class','node-label')
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y',-totalH/2+i*lh).attr('font-size',fs)
        .attr('font-family','Space Mono,monospace').attr('font-weight','700')
        .attr('fill',col).attr('pointer-events','none').attr('opacity',0)
        .text(line)
        .transition().delay(200).duration(300).attr('opacity',1);
    });
    if(n.type==='main'){
      g.append('circle').attr('class','expdot')
        .attr('cx',21).attr('cy',-21).attr('r',0)
        .attr('fill','#111').attr('stroke',getColor(n.theme))
        .attr('stroke-width',.7).attr('pointer-events','none')
        .transition().delay(300).duration(300).attr('r',3.5);
    }
  });

  enter.transition().duration(300).attr('class','node');

  var all = enter.merge(nSel);
  all.selectAll('.expdot')
    .transition().duration(200)
    .attr('fill', function(){ var nd=d3.select(this.parentNode).datum(); return expanded[nd.id]?getColor(nd.theme):'#111'; });
  all.selectAll('.outer-circle')
    .transition().duration(200)
    .attr('r', function(n){ return n.type==='center'?56:n.type==='main'?34:19; });

  nSel.exit()
    .transition().duration(300).ease(d3.easeBackIn.overshoot(1))
    .attr('transform', function(n){ return 'translate('+(n.x||0)+','+(n.y||0)+') scale(0)'; })
    .remove();

  sim.nodes(d.nodes);
  sim.force('link').links(d.links);
  sim.alpha(.5).restart();
}

function highlightNode(id, on){
  gRoot.selectAll('g.node').each(function(n){
    var connected = n.id===id || LINKS.some(function(l){
      return (l.source.id||l.source)===id&&(l.target.id||l.target)===n.id ||
             (l.target.id||l.target)===id&&(l.source.id||l.source)===n.id;
    });
    d3.select(this).selectAll('circle:not(.expdot)')
      .transition().duration(150)
      .attr('opacity', on ? (connected?1:.25) : 1);
  });
  gRoot.selectAll('line.link')
    .transition().duration(150)
    .attr('stroke-opacity', function(l){
      if(!on) return 1;
      return (l.source.id||l.source)===id||(l.target.id||l.target)===id ? 1 : .1;
    });
}

function tick(){
  gRoot.selectAll('line.link')
    .attr('x1',function(l){ return l.source.x; }).attr('y1',function(l){ return l.source.y; })
    .attr('x2',function(l){ return l.target.x; }).attr('y2',function(l){ return l.target.y; });
  gRoot.selectAll('g.node')
    .attr('transform',function(n){ return 'translate('+(n.x||0)+','+(n.y||0)+')'; });
}

function clusterForce(alpha){
  NODES.forEach(function(n){
    if(n.type==='sub'&&expanded[n.parent]){
      var p=NODES.find(function(p){ return p.id===n.parent; });
      if(p&&p.x!==undefined){ n.vx-=(n.x-p.x)*alpha*.12; n.vy-=(n.y-p.y)*alpha*.12; }
    }
  });
}

function onClick(n){
  if(n.type==='main'){
    var was=expanded[n.id];
    expanded[n.id]=!expanded[n.id];
    if(!was) spawnSubNodes(n.id);
    rerender();
  }
  openPanel(n);
}

function openPanel(n){
  var color = getColor(n.theme);
  document.getElementById('panel-bar').style.background = color;
  document.getElementById('panel-title').textContent = n.label.replace('\n',' ');
  document.getElementById('panel-theme').textContent = n.theme ? getLabel(n.theme) : 'CORE CONCEPT';
  document.getElementById('panel-theme').style.color = color;
  document.getElementById('panel-desc').textContent = n.desc || 'No description yet. Add content via the + button.';
  document.getElementById('panel-tags').innerHTML = (n.tags||[]).filter(Boolean).map(function(t){ return '<span class="ptag">'+t+'</span>'; }).join('');
  document.getElementById('panel-src').textContent = 'Source — '+(n.src||'—');
  var docLink = document.getElementById('panel-open-doc');
  if(n.docId){
    docLink.href = 'https://docs.google.com/document/d/'+n.docId+'/edit';
    docLink.style.display = 'block';
  } else { docLink.style.display = 'none'; }
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-close').style.display = 'flex';
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-close').style.display = 'none';
}

function openModal(){
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-content').focus();
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-content').value = '';
  document.getElementById('modal-feedback').textContent = '';
  document.getElementById('submit-btn').disabled = false;
}

function submitArgument(){
  var docKey = document.getElementById('modal-doc').value;
  var content = document.getElementById('modal-content').value.trim();
  if(!content){ document.getElementById('modal-feedback').style.color='#e02020'; document.getElementById('modal-feedback').textContent='Please enter some content.'; return; }
  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  document.getElementById('modal-feedback').style.color='var(--muted2)';
  document.getElementById('modal-feedback').textContent = 'Writing to Google Doc...';
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({docKey:docKey, content:content}),
    redirect:'follow'
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d.success){
      document.getElementById('modal-feedback').style.color='#22c55e';
      document.getElementById('modal-feedback').textContent = '✓ Saved to Google Doc';
      btn.textContent = 'Add to Doc';
      setTimeout(function(){ closeModal(); refreshData(); }, 1500);
    } else {
      document.getElementById('modal-feedback').style.color='#e02020';
      document.getElementById('modal-feedback').textContent = 'Error: '+(d.error||'unknown');
      btn.disabled=false; btn.textContent='Add to Doc';
    }
  })
  .catch(function(){
    document.getElementById('modal-feedback').style.color='#e02020';
    document.getElementById('modal-feedback').textContent = 'Network error. Try again.';
    btn.disabled=false; btn.textContent='Add to Doc';
  });
}

var tip = document.getElementById('tooltip');
function showTip(e,n){ tip.textContent=n.label.replace('\n',' '); tip.style.opacity='1'; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-10)+'px'; }
function hideTip(){ tip.style.opacity='0'; }
function doZoom(k){ d3.select('#svg').transition().duration(280).call(zoom.scaleBy,k); }
function doReset(){ d3.select('#svg').transition().duration(600).ease(d3.easeCubicInOut).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2)); }

window.addEventListener('load', function(){
  W = window.innerWidth; H = window.innerHeight;
  var svgEl = d3.select('#svg');
  gRoot = svgEl.append('g').attr('transform','translate('+W/2+','+H/2+')');
  zoom = d3.zoom().scaleExtent([.15,5])
    .on('zoom',function(e){ gRoot.attr('transform',e.transform); });
  svgEl.call(zoom).on('dblclick.zoom',null);
  svgEl.call(zoom.transform, d3.zoomIdentity.translate(W/2,H/2));
  svgEl.on('click',function(){ closePanel(); });
  sim = d3.forceSimulation()
    .force('link', d3.forceLink().id(function(n){ return n.id; }).distance(function(l){ return l.ltype==='sub'?85:190; }).strength(function(l){ return l.ltype==='sub'?1.4:.8; }))
    .force('charge', d3.forceManyBody().strength(function(n){ return n.type==='center'?-800:n.type==='main'?-450:-140; }))
    .force('center', d3.forceCenter(0,0))
    .force('collide', d3.forceCollide().radius(function(n){ return n.type==='center'?72:n.type==='main'?58:36; }).strength(.8))
    .force('cluster', clusterForce)
    .on('tick', tick);
  document.getElementById('load-sub-text').textContent = 'Connecting to knowledge base...';
  loadData(function(ok){
    document.getElementById('loading').classList.add('hidden');
    if(ok){
      setStatus('live','Live · '+new Date().toLocaleTimeString());
    } else {
      setStatus('','Offline mode');
    }
    rerender();
    setTimeout(function(){ document.getElementById('loading').style.display='none'; }, 700);
  });
  setInterval(refreshData, AUTO_REFRESH);
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(function(){}); }
});
window.addEventListener('resize', function(){ W=window.innerWidth; H=window.innerHeight; });
</script>
</body>
</html>
