<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Conspiracy Map</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--red:#e02020;--red2:#ff3333;--bg:#080808;--surface:#0f0f0f;--surface2:#161616;--border:#1e1e1e;--text:#e8e4e0;--muted:#3a3a3a;--muted2:#555}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}
#app{width:100vw;height:100vh;position:relative;display:flex}
#canvas{flex:1;position:relative;overflow:hidden}
svg#svg{width:100%;height:100%;display:block}
canvas#bg-canvas{position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.3}
#loading{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .8s ease}
#loading.hidden{opacity:0;pointer-events:none}
.load-ring{width:44px;height:44px;border:1.5px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:18px}
.load-text{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:.12em;text-transform:uppercase}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
@keyframes slide-up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#header{position:absolute;top:20px;left:22px;z-index:10;pointer-events:none;animation:fade-in .8s ease both}
#logo{font-size:17px;font-weight:700;color:var(--red);letter-spacing:.06em}
#logo span{color:var(--text);opacity:.3}
#tagline{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:2px;letter-spacing:.1em;text-transform:uppercase}
#breadcrumb{position:absolute;top:58px;left:22px;z-index:10;display:flex;align-items:center;flex-wrap:wrap;gap:4px;font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;max-width:55vw}
.bc-item{cursor:pointer;transition:color .15s;padding:1px 0}
.bc-item:hover{color:var(--red)}
.bc-item.current{color:var(--muted2);cursor:default}
.bc-sep{opacity:.35;pointer-events:none}
#topbar{position:absolute;top:20px;right:22px;display:flex;align-items:center;gap:6px;z-index:10}
.top-btn{height:26px;border-radius:3px;background:transparent;border:0.5px solid var(--border);color:var(--muted);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Space Mono',monospace;padding:0 8px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.top-btn:hover{border-color:var(--red);color:var(--red)}
.top-btn.active{border-color:var(--red);color:var(--red);background:rgba(224,32,32,.08)}
.top-btn.icon{width:26px;padding:0;font-size:13px}
#refresh-btn.spinning{animation:spin .8s linear infinite}
#sync-status{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:.06em;display:flex;align-items:center;gap:5px}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sync-dot.live{background:#22c55e;animation:pulse-dot 2s infinite}
.sync-dot.loading{background:var(--red);animation:pulse-dot 1s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
#controls{position:absolute;bottom:24px;left:22px;display:flex;flex-direction:column;gap:5px;z-index:10}
.ctrl-btn{width:32px;height:32px;border-radius:4px;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctrl-btn:hover{background:var(--surface2);color:var(--red);border-color:var(--red)}
#back-area{position:absolute;bottom:24px;left:22px;display:none;flex-direction:column;gap:5px;z-index:11}
#back-area.visible{display:flex}
#back-btn{height:32px;padding:0 12px;border-radius:4px;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);cursor:pointer;font-size:9px;display:flex;align-items:center;gap:6px;transition:all .15s;font-family:'Space Mono',monospace;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;max-width:140px;overflow:hidden}
#back-btn:hover{background:var(--surface2);color:var(--red);border-color:var(--red)}
#back-btn:hover .back-arrow{transform:translateX(-2px)}
.back-arrow{font-size:14px;transition:transform .15s;flex-shrink:0}
#back-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;z-index:9;text-align:center;letter-spacing:.06em;pointer-events:none;opacity:.3}
#tooltip{position:fixed;background:var(--surface);border:0.5px solid rgba(224,32,32,.4);border-radius:2px;padding:4px 9px;font-size:9px;color:var(--red);pointer-events:none;opacity:0;transition:opacity .1s;z-index:100;font-family:'Space Mono',monospace;white-space:nowrap;letter-spacing:.06em}
#panel{width:0;overflow:hidden;background:var(--surface);border-left:0.5px solid var(--border);transition:width .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;flex-shrink:0;position:relative}
#panel.open{width:320px}
#panel-inner{padding:20px 18px 24px;overflow-y:auto;height:100%;display:flex;flex-direction:column}
#panel-toprow{display:flex;align-items:center;gap:10px;margin-bottom:18px}
#panel-back{width:28px;height:28px;border-radius:3px;background:transparent;border:0.5px solid var(--border);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
#panel-back:hover{border-color:var(--red);color:var(--red);transform:translateX(-2px)}
#panel-bar{flex:1;height:2px;border-radius:1px;transition:background .3s}
#panel-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:3px;line-height:1.2;color:var(--text)}
#panel-cat{font-size:9px;font-family:'Space Mono',monospace;margin-bottom:12px;text-transform:uppercase;letter-spacing:.12em}
#panel-desc{font-size:12px;line-height:1.85;color:#585450;margin-bottom:14px;border-left:1.5px solid var(--border);padding-left:12px}
#panel-src{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;padding-top:12px;border-top:0.5px solid var(--border);margin-top:auto}
#panel-doc{display:none;margin-top:10px;padding:7px 12px;border-radius:3px;background:transparent;border:0.5px solid var(--border);color:var(--muted2);font-size:9px;font-family:'Space Mono',monospace;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;text-align:center;text-decoration:none}
#panel-doc:hover{border-color:var(--red);color:var(--red)}
.node{cursor:pointer}
#search-overlay{position:fixed;inset:0;background:rgba(8,8,8,.92);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);z-index:200;display:none;flex-direction:column;align-items:center;padding:80px 20px 40px;overflow-y:auto}
#search-overlay.open{display:flex;animation:fade-in .25s ease both}
#search-box{display:flex;align-items:center;gap:10px;width:100%;max-width:640px;background:var(--surface);border:0.5px solid var(--border);border-radius:6px;padding:10px 14px;transition:border-color .2s}
#search-box:focus-within{border-color:var(--red)}
#search-big-icon{font-size:18px;color:var(--red);flex-shrink:0}
#search-big{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:15px;font-family:'Syne',sans-serif;letter-spacing:.02em}
#search-big::placeholder{color:var(--muted2)}
#search-close{background:transparent;border:0;color:var(--muted2);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;transition:color .15s}
#search-close:hover{color:var(--red)}
#search-results-count{width:100%;max-width:640px;margin-top:14px;font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
#search-results{width:100%;max-width:640px;margin-top:10px;display:flex;flex-direction:column;gap:6px}
.sr-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:4px;cursor:pointer;transition:all .15s;animation:slide-up .3s ease both}
.sr-item:hover{border-color:var(--red);background:var(--surface2);transform:translateX(2px)}
.sr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sr-content{flex:1;min-width:0}
.sr-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;letter-spacing:.02em}
.sr-desc{font-size:11px;color:#585450;line-height:1.55;margin-bottom:5px}
.sr-path{font-size:8.5px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.sr-badge{font-size:8px;font-family:'Space Mono',monospace;padding:3px 7px;border:0.5px solid;border-radius:2px;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0;align-self:flex-start}
mark{background:rgba(224,32,32,.18);color:var(--red);padding:0 2px;border-radius:2px}
@media(max-width:640px){#panel.open{width:100vw;position:absolute;top:0;right:0;z-index:50;height:100%}#hint{display:none}}
</style>
</head>
<body>
<div id="app">
  <div id="canvas">
    <canvas id="bg-canvas"></canvas>
    <div id="loading"><div class="load-ring"></div><div class="load-text">Initializing map</div></div>
    <div id="header"><div id="logo">CONSPIRACY<span> //</span> MAP</div><div id="tagline" data-en="Theory mapping tool" data-fr="Cartographie des theories">Theory mapping tool</div></div>
    <div id="breadcrumb"></div>
    <div id="topbar">
      <div id="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">Local</span></div>
      <button id="refresh-btn" class="top-btn icon" onclick="trySync()">&#8635;</button>
      <button class="top-btn icon" onclick="toggleSearch()">&#9906;</button>
      <button class="top-btn" id="expand-btn" onclick="toggleExpand()" data-en="ALL" data-fr="TOUT">ALL</button>
      <button class="top-btn" id="lang-btn" onclick="toggleLang()">FR</button>
    </div>
    <div id="controls">
      <button class="ctrl-btn" onclick="doZoom(1.35)">+</button>
      <button class="ctrl-btn" onclick="doZoom(0.74)">&#8722;</button>
      <button class="ctrl-btn" onclick="doReset()">&#8857;</button>
    </div>
    <div id="back-area">
      <button id="back-btn" onclick="drillUp()"><span class="back-arrow">&#8592;</span><span id="back-label">BACK</span></button>
      <button class="ctrl-btn" onclick="doZoom(1.35)">+</button>
      <button class="ctrl-btn" onclick="doZoom(0.74)">&#8722;</button>
      <button class="ctrl-btn" onclick="doReset()">&#8857;</button>
    </div>
    <div id="hint" data-en="CLICK node WITH ARROW to drill down  .  CLICK leaf to read" data-fr="CLIC fleche = approfondir  .  CLIC feuille = lire">CLICK node WITH ARROW to drill down  .  CLICK leaf to read</div>
    <svg id="svg"></svg>
    <div id="tooltip"></div>
  </div>
  <div id="panel">
    <div id="panel-inner">
      <div id="panel-toprow"><button id="panel-back" onclick="closePanel()">&#8592;</button><div id="panel-bar"></div></div>
      <div id="panel-title"></div>
      <div id="panel-cat"></div>
      <div id="panel-desc"></div>
      <div id="panel-src"></div>
      <a id="panel-doc" target="_blank" rel="noopener">Open in Google Docs &#8599;</a>
    </div>
  </div>
  <div id="search-overlay" onclick="if(event.target===this)closeSearch()">
    <div id="search-box">
      <span id="search-big-icon">&#8981;</span>
      <input id="search-big" type="text" placeholder="Search a concept, actor, method..." oninput="doSearch(this.value)" onkeydown="if(event.key==='Escape')closeSearch()"/>
      <button id="search-close" onclick="closeSearch()">&times;</button>
    </div>
    <div id="search-results-count"></div>
    <div id="search-results"></div>
  </div>
</div>

var CHILDREN={
center:['power','actors','means','methods','symbols'],
means:['cognitive','human','lockdown','occult'],
power:['p1','p2','p3'],
actors:['a1','a2','a3','a4','a5','a6','a7','a8'],
cognitive:['c1','c2','c3','c4','c5','c6','c7'],
human:['h1','h2','h3','h4','h5','h6','h7','h8'],
lockdown:['l1','l2','l3','l4','l5'],
occult:['o1','o2','o3','o4','o5'],
methods:['m1','m2','m3','m4','m5','m6','m7','m8'],
symbols:['s1','s2','s3','s4','s5']
};

var posCache={};
function hasKids(id){return !!(CHILDREN[id]&&CHILDREN[id].length);}

var viewStack=[];
var currentId='center';
var expandAll=false;
var searchQ='';
var panelNode=null;
var gRoot,sim,zoom,W=window.innerWidth,H=window.innerHeight;

function getDesc(n){return LANG==='fr'?(n.desc_fr||n.desc_en||''):(n.desc_en||n.desc_fr||'');}

function drillDown(id){
  if(!hasKids(id)){openPanel(ND[id]);return;}
  viewStack.push({id:currentId,label:shortLabel(currentId)});
  currentId=id;expandAll=false;
  refreshView(true);updateBC();updateBackBtn();closePanel();
}
function drillUp(){
  if(!viewStack.length)return;
  var prev=viewStack.pop();currentId=prev.id;expandAll=false;
  refreshView(false);updateBC();updateBackBtn();closePanel();
}
function bcGoTo(id){
  if(id==='center'){viewStack=[];currentId='center';}
  else{
    var idx=viewStack.findIndex(function(v){return v.id===id;});
    if(idx>=0){viewStack=viewStack.slice(0,idx+1);currentId=id;}
  }
  expandAll=false;refreshView(false);updateBC();updateBackBtn();closePanel();
}
function toggleExpand(){
  expandAll=!expandAll;
  document.getElementById('expand-btn').classList.toggle('active',expandAll);
  refreshView(true);
}
function shortLabel(id){
  var n=ND[id];if(!n)return id;
  return (n.label||'').replace('\n',' ');
}

function buildData(){
  if(expandAll)return buildAllData();
  var cnode=Object.assign({},ND[currentId],{_role:'center'});
  if(posCache[currentId]){cnode.x=posCache[currentId].x;cnode.y=posCache[currentId].y;}
  else{cnode.x=0;cnode.y=0;}
  var kids=CHILDREN[currentId]||[];
  var nodes=[cnode];var links=[];
  var a=(2*Math.PI)/Math.max(kids.length,1);
  kids.forEach(function(cid,i){
    var n=Object.assign({},ND[cid],{_role:'child',_par:currentId});
    if(posCache[currentId+'_'+cid]){n.x=posCache[currentId+'_'+cid].x;n.y=posCache[currentId+'_'+cid].y;}
    else{n.x=Math.cos(i*a-Math.PI/2)*200+(Math.random()-.5)*10;n.y=Math.sin(i*a-Math.PI/2)*200+(Math.random()-.5)*10;}
    nodes.push(n);links.push({source:currentId,target:cid,ltype:'main'});
  });
  return{nodes:nodes,links:links};
}

function buildAllData(){
  var nodes=[];var links=[];
  function place(id,px,py,ang,sweep,depth){
    var n=Object.assign({},ND[id],{_role:depth===0?'center':depth===1?'child':'sub'});
    var r=depth*190;
    n.x=depth===0?0:px+Math.cos(ang+sweep/2)*r;
    n.y=depth===0?0:py+Math.sin(ang+sweep/2)*r;
    nodes.push(n);
    var kids=CHILDREN[id]||[];
    var sub=kids.length>0?sweep/kids.length:0;
    kids.forEach(function(kid,i){
      links.push({source:id,target:kid,ltype:depth===0?'main':'sub'});
      place(kid,n.x,n.y,ang+i*sub,sub,depth+1);
    });
  }
  place('center',0,0,-Math.PI,2*Math.PI,0);
  return{nodes:nodes,links:links};
}

function refreshView(anim){
  var d=buildData();
  renderLinks(d.links);
  renderNodes(d.nodes,anim);
  sim.nodes(d.nodes);
  sim.force('link').links(d.links);
  var kids=(CHILDREN[currentId]||[]).length;
  var dist=expandAll?170:kids>6?140:200;
  var chg=expandAll?-400:currentId==='center'?-800:-500;
  sim.force('link').distance(dist);
  sim.force('charge').strength(chg);
  sim.alpha(.6).restart();
}

function renderLinks(links){
  var nodeIds={};
  gRoot.selectAll('g.node').data().forEach(function(n){nodeIds[n.id]=true;});
  var validLinks=links.filter(function(l){
    var sid=l.source.id||l.source;
    var tid=l.target.id||l.target;
    return nodeIds[sid]&&nodeIds[tid];
  });
  var lSel=gRoot.selectAll('line.link').data(validLinks,function(l){return (l.source.id||l.source)+'-'+(l.target.id||l.target);});
  lSel.enter().append('line').attr('class','link')
    .attr('stroke',function(l){var n=ND[l.target.id||l.target];return n?n.color+(l.ltype==='sub'?'35':'55'):'#e0202030';})
    .attr('stroke-width',function(l){return l.ltype==='sub'?.6:1.2;})
    .attr('stroke-opacity',0)
    .transition().duration(350).attr('stroke-opacity',1);
  lSel.exit().transition().duration(200).attr('stroke-opacity',0).remove();
}

function nodeR(n){
  if(n._role==='center')return 58;
  if(n._role==='child')return hasKids(n.id)?36:28;
  return 17;
}

function renderNodes(nodes,anim){
  var nSel=gRoot.selectAll('g.node').data(nodes,function(n){return n.id;});
  nSel.exit().transition().duration(350).attr('opacity',0)
    .attr('transform',function(n){return 'translate('+(n.x||0)+','+(n.y||0)+') scale(0)';}).remove();

  var enter=nSel.enter().append('g').attr('class','node').attr('opacity',0)
    .call(d3.drag()
      .on('start',function(e,n){if(!e.active)sim.alphaTarget(.3).restart();n.fx=n.x;n.fy=n.y;})
      .on('drag', function(e,n){n.fx=e.x;n.fy=e.y;})
      .on('end',  function(e,n){if(!e.active)sim.alphaTarget(0);n.fx=null;n.fy=null;}))
    .on('click',function(e,n){e.stopPropagation();handleClick(n);})
    .on('mouseover',function(e,n){showTip(e,n);hlConn(n.id,true);})
    .on('mouseout', function(e,n){hideTip();hlConn(n.id,false);});

  enter.append('circle').attr('class','oc').attr('r',0).attr('fill','#020202')
    .attr('stroke',function(n){return n.color||'#e02020';})
    .attr('stroke-width',function(n){return n._role==='center'?2:n._role==='child'?1.2:.6;})
    .attr('stroke-opacity',function(n){return n._role==='sub'?.4:.85;})
    .transition().duration(anim?550:250).ease(d3.easeBackOut.overshoot(1.2))
    .attr('r',nodeR);

  enter.append('circle').attr('class','ic').attr('r',0)
    .attr('fill',function(n){return (n.color||'#e02020')+'12';}).attr('stroke','none')
    .transition().duration(anim?550:250).ease(d3.easeBackOut.overshoot(1.2))
    .attr('r',function(n){return nodeR(n)-3;});

  enter.filter(function(n){return n._role==='center';})
    .append('circle').attr('class','pulse').attr('r',58).attr('fill','none')
    .attr('stroke',function(n){return n.color||'#e02020';})
    .attr('stroke-width',.8).attr('stroke-opacity',.18).attr('pointer-events','none');

  enter.filter(function(n){return n._role==='child'&&hasKids(n.id);})
    .append('circle').attr('class','ddot').attr('cx',function(n){return nodeR(n)-6;}).attr('cy',function(n){return -(nodeR(n)-6);}).attr('r',0)
    .attr('fill','#111').attr('stroke',function(n){return n.color||'#e02020';}).attr('stroke-width',.7).attr('pointer-events','none')
    .transition().delay(anim?300:100).duration(300).attr('r',3.5);

  enter.each(function(n){
    var g=d3.select(this);
    var lines=(n.label||'').split('\n');
    var fs=n._role==='center'?11:n._role==='child'?10:8;
    var lh=11;var col=n._role==='center'?'#e02020':'#bab6b2';
    var totalH=(lines.length-1)*lh;
    lines.forEach(function(line,i){
      g.append('text').attr('class','nl')
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y',-totalH/2+i*lh).attr('font-size',fs)
        .attr('font-family','Space Mono,monospace').attr('font-weight','700')
        .attr('fill',col).attr('pointer-events','none').attr('opacity',0)
        .text(line)
        .transition().delay(anim?200:50).duration(300).attr('opacity',1);
    });
    if(n._role==='center'&&(n.sub_en||n.sub_fr)){
      var sub=LANG==='fr'?(n.sub_fr||n.sub_en):(n.sub_en||n.sub_fr);
      if(sub) g.append('text').attr('class','sub-lbl')
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y',lines.length*lh/2+11).attr('font-size',7)
        .attr('font-family','Space Mono,monospace')
        .attr('fill','rgba(224,32,32,.45)').attr('pointer-events','none')
        .text(sub.length>35?sub.slice(0,33)+'...':sub);
    }
  });

  enter.transition().duration(anim?400:200).attr('opacity',1);
  enter.merge(nSel).selectAll('.ddot').transition().duration(200)
    .attr('fill',function(){var nd=d3.select(this.parentNode).datum();return expandAll?'#111':(viewStack.length&&viewStack[viewStack.length-1].id===nd.id?nd.color:'#111');});

  animatePulse();
  applySearch();
}

function animatePulse(){
  gRoot.selectAll('.pulse').each(function(){
    var r=d3.select(this);
    (function p(){r.attr('r',58).attr('stroke-opacity',.18).transition().duration(2400).ease(d3.easeLinear).attr('r',88).attr('stroke-opacity',0).on('end',p);})();
  });
}

function handleClick(n){
  if(hasKids(n.id))drillDown(n.id);
  else openPanel(n);
}

function hlConn(id,on){
  gRoot.selectAll('g.node').selectAll('circle:not(.pulse)').transition().duration(120)
    .attr('opacity',function(){
      if(!on)return 1;
      var nd=d3.select(this.parentNode).datum();
      if(nd.id===id)return 1;
      var conn=gRoot.selectAll('line.link').data().some(function(l){
        return (l.source.id||l.source)===id&&(l.target.id||l.target)===nd.id||(l.target.id||l.target)===id&&(l.source.id||l.source)===nd.id;
      });
      return conn?1:.12;
    });
  gRoot.selectAll('line.link').transition().duration(120)
    .attr('stroke-opacity',function(l){if(!on)return 1;return (l.source.id||l.source)===id||(l.target.id||l.target)===id?1:.05;});
}

function tick(){
  gRoot.selectAll('line.link').attr('x1',function(l){return l.source.x;}).attr('y1',function(l){return l.source.y;}).attr('x2',function(l){return l.target.x;}).attr('y2',function(l){return l.target.y;});
  gRoot.selectAll('g.node').attr('transform',function(n){
    posCache[n.id]={x:n.x,y:n.y};
    if(n._par) posCache[n._par+'_'+n.id]={x:n.x,y:n.y};
    return 'translate('+(n.x||0)+','+(n.y||0)+')';
  });
}

function toggleSearch(){
  var ov=document.getElementById('search-overlay');
  ov.classList.add('open');
  setTimeout(function(){document.getElementById('search-big').focus();},80);
}
function closeSearch(){
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-big').value='';
  document.getElementById('search-results').innerHTML='';
  document.getElementById('search-results-count').textContent='';
}
function getNodePath(id){
  for(var parent in CHILDREN){
    if(CHILDREN[parent]&&CHILDREN[parent].indexOf(id)>=0){
      if(parent==='center') return 'NWO';
      var pn=ND[parent];
      var pl=(pn&&pn.label||parent).replace('\n',' ');
      return 'NWO \u203A '+pl;
    }
  }
  return 'NWO';
}
function highlight(text,q){
  if(!q||!text) return text||'';
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return text.replace(re,'<mark>$1</mark>');
}
function doSearch(q){
  var res=document.getElementById('search-results');
  var cnt=document.getElementById('search-results-count');
  q=q.trim();
  if(!q){res.innerHTML='';cnt.textContent='';return;}
  var matches=[];
  Object.keys(ND).forEach(function(id){
    if(id==='center') return;
    var n=ND[id];
    var lbl=(n.label||'').replace('\n',' ');
    var desc=getDesc(n)||'';
    var score=0;
    var lq=q.toLowerCase();
    if(lbl.toLowerCase().indexOf(lq)>=0) score+=3;
    if(desc.toLowerCase().indexOf(lq)>=0) score+=1;
    if(score>0) matches.push({n:n,id:id,score:score,lbl:lbl,desc:desc});
  });
  matches.sort(function(a,b){return b.score-a.score;});
  cnt.textContent=matches.length+' result'+(matches.length!==1?'s':'');
  if(matches.length===0){
    res.innerHTML='<div style="text-align:center;padding:32px 0;font-family:Space Mono,monospace;font-size:10px;color:var(--muted)">No results for "'+q+'"</div>';
    return;
  }
  res.innerHTML=matches.slice(0,20).map(function(m){
    var isLeaf=m.n.type==='leaf';
    var badge=isLeaf?'argument':'category';
    var color=m.n.color||'#e02020';
    var path=getNodePath(m.id);
    var hlLbl=highlight(m.lbl,q);
    var hlDesc=highlight(m.desc.slice(0,120)+(m.desc.length>120?'...':''),q);
    return '<div class="sr-item" onclick="goToNode(\''+m.id+'\')">'
      +'<div class="sr-dot" style="background:'+color+';margin-top:5px"></div>'
      +'<div class="sr-content">'
        +'<div class="sr-title">'+hlLbl+'</div>'
        +'<div class="sr-desc">'+hlDesc+'</div>'
        +'<div class="sr-path">'+path+'</div>'
      +'</div>'
      +'<div class="sr-badge" style="color:'+color+';border-color:'+color+'40">'+badge+'</div>'
    +'</div>';
  }).join('');
}
function goToNode(id){
  closeSearch();
  var n=ND[id];if(!n) return;
  var path=[];
  function findPath(targetId,fromId){
    if(fromId===targetId) return true;
    var kids=CHILDREN[fromId]||[];
    for(var i=0;i<kids.length;i++){
      if(kids[i]===targetId||findPath(targetId,kids[i])){
        path.unshift(fromId);return true;
      }
    }
    return false;
  }
  findPath(id,'center');
  viewStack=[];currentId='center';
  var parentId='center';
  if(path.length>1){
    for(var i=1;i<path.length;i++){
      viewStack.push({id:parentId,label:shortLabel(parentId)});
      parentId=path[i];
    }
    currentId=parentId;
  }
  expandAll=false;
  refreshView(true);updateBC();updateBackBtn();
  setTimeout(function(){openPanel(n);},400);
}
function applySearch(){
  if(!searchQ){gRoot.selectAll('g.node').attr('opacity',1);return;}
  gRoot.selectAll('g.node').attr('opacity',function(n){
    var lbl=(n.label||'').toLowerCase();
    var de=(getDesc(n)||'').toLowerCase();
    return lbl.indexOf(searchQ)>=0||de.indexOf(searchQ)>=0?1:.06;
  });
}

function updateBC(){
  var bc=document.getElementById('breadcrumb');bc.innerHTML='';
  var items=[{id:'center',label:'NWO'}];
  viewStack.forEach(function(v){if(v.id!=='center')items.push({id:v.id,label:shortLabel(v.id)});});
  if(currentId!=='center')items.push({id:currentId,label:shortLabel(currentId)});
  items.forEach(function(item,i){
    if(i>0){var sep=document.createElement('span');sep.className='bc-sep';sep.textContent='>';bc.appendChild(sep);}
    var el=document.createElement('span');
    el.className='bc-item'+(i===items.length-1?' current':'');
    el.textContent=item.label.length>14?item.label.slice(0,13)+'...':item.label;
    if(i<items.length-1)(function(id){el.onclick=function(){bcGoTo(id);};})(item.id);
    bc.appendChild(el);
  });
}

function updateBackBtn(){
  var ba=document.getElementById('back-area');
  var ctrl=document.getElementById('controls');
  if(viewStack.length>0){
    ba.classList.add('visible');ctrl.style.display='none';
    var prev=viewStack[viewStack.length-1];
    var lbl=shortLabel(prev.id);
    document.getElementById('back-label').textContent=lbl.length>14?lbl.slice(0,13)+'...':lbl;
  } else {
    ba.classList.remove('visible');ctrl.style.display='flex';
  }
}

function openPanel(n){
  panelNode=n;var color=n.color||'#e02020';
  document.getElementById('panel-bar').style.background=color;
  document.getElementById('panel-title').textContent=(n.label||'').replace('\n',' ');
  var cat=document.getElementById('panel-cat');
  cat.textContent=LANG==='fr'?'ARGUMENT':'ARGUMENT';cat.style.color=color;
  var desc=LANG==='fr'?(n.desc_fr||n.desc_en):(n.desc_en||n.desc_fr);
  document.getElementById('panel-desc').textContent=desc||'';
  document.getElementById('panel-src').textContent='Source — Conspiracy Docs';
  var dl=document.getElementById('panel-doc');
  if(n.docId){dl.href='https://docs.google.com/document/d/'+n.docId+'/edit';dl.style.display='block';dl.textContent=LANG==='fr'?'Ouvrir dans Google Docs':'Open in Google Docs';}
  else dl.style.display='none';
  document.getElementById('panel').classList.add('open');
  ['panel-title','panel-cat','panel-desc','panel-src'].forEach(function(id,i){var el=document.getElementById(id);el.style.animation='none';el.offsetHeight;el.style.animation='slide-up .3s '+(i*.06)+'s ease both';});
}
function closePanel(){document.getElementById('panel').classList.remove('open');panelNode=null;}

function toggleLang(){
  LANG=LANG==='en'?'fr':'en';localStorage.setItem('cm_lang',LANG);
  document.getElementById('lang-btn').textContent=LANG==='en'?'FR':'EN';
  document.querySelectorAll('[data-en]').forEach(function(el){var v=el.getAttribute('data-'+LANG)||el.getAttribute('data-en');if(v)el.textContent=v;});
  if(panelNode)openPanel(panelNode);
}

function trySync(){
  var btn=document.getElementById('refresh-btn');btn.classList.add('spinning');
  var dot=document.getElementById('sync-dot');var txt=document.getElementById('sync-text');
  dot.className='sync-dot loading';txt.textContent='Syncing...';
  fetch(GAS_URL+'?action=all',{redirect:'follow'}).then(function(r){return r.json();})
    .then(function(){btn.classList.remove('spinning');dot.className='sync-dot live';txt.textContent='Live . '+new Date().toLocaleTimeString();})
    .catch(function(){btn.classList.remove('spinning');dot.className='sync-dot';txt.textContent='Local';});
}

function initBg(){
  var c=document.getElementById('bg-canvas');
  c.width=W;c.height=H;
  var ctx=c.getContext('2d');
  var pts=[];
  for(var i=0;i<55;i++) pts.push({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25,
    r:Math.random()*1.2+.4
  });
  var bgRaf;
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(function(p){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
    });
    for(var i=0;i<pts.length;i++){
      for(var j=i+1;j<pts.length;j++){
        var dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        var d=Math.sqrt(dx*dx+dy*dy);
        if(d<140){
          ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle='rgba(224,32,32,'+(0.1*(1-d/140))+')';
          ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
    pts.forEach(function(p){
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(224,32,32,0.4)';ctx.fill();
    });
    bgRaf=requestAnimationFrame(draw);
  }
  if(window._bgRaf) cancelAnimationFrame(window._bgRaf);
  draw();
  window._bgRaf=bgRaf;
}

var tip=document.getElementById('tooltip');
function showTip(e,n){tip.textContent=(n.label||'').replace('\n',' ')+(hasKids(n.id)?' \u2192':'');tip.style.opacity='1';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';}
function hideTip(){tip.style.opacity='0';}
function doZoom(k){d3.select('#svg').transition().duration(280).call(zoom.scaleBy,k);}
function doReset(){d3.select('#svg').transition().duration(600).ease(d3.easeCubicInOut).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2));}

window.addEventListener('load',function(){
  document.getElementById('lang-btn').textContent=LANG==='en'?'FR':'EN';
  initBg();W=window.innerWidth;H=window.innerHeight;
  var svgEl=d3.select('#svg');
  gRoot=svgEl.append('g').attr('transform','translate('+W/2+','+H/2+')');
  zoom=d3.zoom().scaleExtent([.1,7]).on('zoom',function(e){gRoot.attr('transform',e.transform);});
  svgEl.call(zoom).on('dblclick.zoom',null);
  svgEl.call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2));
  svgEl.on('click',function(){closePanel();});
  sim=d3.forceSimulation()
    .force('link',d3.forceLink().id(function(n){return n.id;}).distance(200).strength(.9))
    .force('charge',d3.forceManyBody().strength(-800))
    .force('center',d3.forceCenter(0,0))
    .force('collide',d3.forceCollide().radius(function(n){return nodeR(n)+12;}).strength(.85))
    .on('tick',tick);
  setTimeout(function(){
    document.getElementById('loading').classList.add('hidden');
    refreshView(true);updateBC();updateBackBtn();
    setTimeout(function(){document.getElementById('loading').style.display='none';},800);
  },500);
  setInterval(trySync,5*60*1000);
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(function(){});
});
window.addEventListener('resize',function(){W=window.innerWidth;H=window.innerHeight;initBg();});
</script>
