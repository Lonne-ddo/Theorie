<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complot Map</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b0f;
  --surface:#0d1117;
  --surface2:#131920;
  --border:rgba(255,255,255,0.07);
  --text:#e8eaf0;
  --muted:#6b7280;
  --green:#00e5a0;
  --blue:#00b8d4;
  --red:#ff4d6d;
  --yellow:#f7c948;
  --purple:#a855f7;
  --pink:#f472b6;
  --orange:#fb923c;
  --slate:#64748b;
  --font-title:'Syne',sans-serif;
  --font-mono:'Space Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
#app{position:relative;width:100vw;height:100vh;display:flex}
#canvas{flex:1;position:relative;overflow:hidden}
svg{width:100%;height:100%;cursor:grab}
svg.dragging{cursor:grabbing}

/* Panel */
#panel{
  width:0;overflow:hidden;
  background:var(--surface);
  border-left:0.5px solid var(--border);
  transition:width .3s ease;
  display:flex;flex-direction:column;
  flex-shrink:0;
}
#panel.open{width:340px}
#panel-inner{padding:24px;overflow-y:auto;height:100%}
#panel-theme-bar{height:4px;border-radius:2px;margin-bottom:20px}
#panel-icon{font-size:28px;margin-bottom:12px}
#panel-title{font-family:var(--font-title);font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.2}
#panel-subtitle{font-size:12px;color:var(--muted);font-family:var(--font-mono);margin-bottom:18px;text-transform:uppercase;letter-spacing:.08em}
#panel-desc{font-size:14px;line-height:1.7;color:rgba(232,234,240,.8);margin-bottom:20px}
#panel-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.ptag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--font-mono);background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.1);color:var(--muted)}
#panel-sources{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
#panel-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border:0.5px solid var(--border);border-radius:50%;background:transparent;color:var(--muted);cursor:pointer;font-size:16px;display:none;align-items:center;justify-content:center;transition:all .15s}
#panel-close:hover{background:var(--surface2);color:var(--text)}
#panel.open~#panel-close{display:flex}

/* Header */
#header{
  position:absolute;top:20px;left:20px;
  display:flex;align-items:center;gap:12px;
  z-index:10;pointer-events:none;
}
#logo{
  font-family:var(--font-title);font-size:18px;font-weight:700;
  color:var(--green);letter-spacing:-.02em;
}
#tagline{font-size:12px;color:var(--muted);font-family:var(--font-mono)}

/* Controls */
#controls{
  position:absolute;bottom:24px;left:24px;
  display:flex;flex-direction:column;gap:8px;z-index:10;
}
.ctrl-btn{
  width:36px;height:36px;border-radius:8px;
  background:var(--surface);border:0.5px solid var(--border);
  color:var(--muted);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.ctrl-btn:hover{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,.15)}

/* Legend */
#legend{
  position:absolute;bottom:24px;right:24px;
  background:var(--surface);border:0.5px solid var(--border);
  border-radius:12px;padding:14px 16px;z-index:10;
  max-width:200px;
}
#legend h4{font-family:var(--font-title);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:rgba(232,234,240,.7)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Tooltip */
#tooltip{
  position:absolute;background:var(--surface);
  border:0.5px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:12px;color:var(--text);
  pointer-events:none;opacity:0;transition:opacity .15s;
  z-index:20;max-width:180px;font-family:var(--font-mono);
  white-space:nowrap;
}

/* Node styles via D3 */
.node-center circle{filter:drop-shadow(0 0 12px rgba(0,229,160,.35))}
.node circle{cursor:pointer;transition:r .2s}
.node text{pointer-events:none;user-select:none}
.link{stroke:rgba(255,255,255,.08);fill:none}
.link.active{stroke:rgba(255,255,255,.18)}

/* Hint */
#hint{
  position:absolute;top:20px;right:20px;
  font-size:11px;color:var(--muted);font-family:var(--font-mono);
  z-index:10;text-align:right;line-height:1.8;
}

/* Mobile */
@media(max-width:640px){
  #panel.open{width:100vw;position:absolute;top:0;right:0;z-index:50;height:100%}
  #legend{display:none}
  #hint{display:none}
}
</style>
</head>
<body>
<div id="app">
  <div id="canvas">
    <div id="header">
      <div>
        <div id="logo">COMPLOT MAP</div>
        <div id="tagline">Cartographie des théories</div>
      </div>
    </div>
    <div id="hint">Clic — détails · Scroll — zoom<br>Clic nœud principal — développer</div>
    <div id="controls">
      <button class="ctrl-btn" onclick="zoomIn()" title="Zoom +">+</button>
      <button class="ctrl-btn" onclick="zoomOut()" title="Zoom -">−</button>
      <button class="ctrl-btn" onclick="resetZoom()" title="Centrer">⊙</button>
    </div>
    <div id="legend">
      <h4>Thèmes</h4>
    </div>
    <svg id="svg"></svg>
    <div id="tooltip"></div>
  </div>

  <div id="panel">
    <div id="panel-inner">
      <div id="panel-theme-bar"></div>
      <div id="panel-icon"></div>
      <div id="panel-title"></div>
      <div id="panel-subtitle"></div>
      <div id="panel-desc"></div>
      <div id="panel-tags"></div>
      <div id="panel-sources"></div>
    </div>
  </div>
  <button id="panel-close" onclick="closePanel()">×</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

var LINKS = [];
NODES.forEach(function(n){
  if(n.type==='main') LINKS.push({source:'center', target:n.id, type:'main'});
  if(n.type==='sub')  LINKS.push({source:n.parent, target:n.id, type:'sub'});
});

// State
var expandedNodes = {};
var visibleNodes, visibleLinks;

function getVisibleData(){
  var vn = NODES.filter(function(n){ return n.type!=='sub' || expandedNodes[n.parent]; });
  var ids = {};
  vn.forEach(function(n){ ids[n.id]=true; });
  var vl = LINKS.filter(function(l){ return ids[l.source]&&ids[l.target]; });
  return {nodes:vn, links:vl};
}

function init(){
  W = document.getElementById('canvas').offsetWidth;
  H = document.getElementById('canvas').offsetHeight;

  // Build legend
  var leg = document.getElementById('legend');
  Object.keys(THEMES).forEach(function(k){
    var t = THEMES[k];
    var item = document.createElement('div');
    item.className='leg-item';
    item.innerHTML='<div class="leg-dot" style="background:'+t.color+'"></div><span>'+t.label+'</span>';
    leg.appendChild(item);
  });

  svg = d3.select('#svg')
    .call(d3.zoom()
      .scaleExtent([0.3,3])
      .on('zoom', function(e){ gMain.attr('transform', e.transform); })
    );
  svg.on('dblclick.zoom', null);
  zoomBehavior = d3.zoom().scaleExtent([0.3,3]).on('zoom', function(e){ gMain.attr('transform', e.transform); });
  d3.select('#svg').call(zoomBehavior);

  gMain = svg.append('g').attr('transform','translate('+W/2+','+H/2+')');

  simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(function(d){ return d.id; }).distance(function(d){ return d.type==='sub'?90:160; }).strength(1))
    .force('charge', d3.forceManyBody().strength(function(d){ return d.type==='center'?-800:d.type==='main'?-400:-180; }))
    .force('center', d3.forceCenter(0,0))
    .force('collide', d3.forceCollide().radius(function(d){ return d.type==='center'?70:d.type==='main'?55:40; }));

  render();
}

function render(){
  var data = getVisibleData();

  var linkSel = gMain.selectAll('.link').data(data.links, function(d){ return d.source.id+'-'+d.target.id; });
  linkSel.enter().append('line').attr('class','link').attr('stroke-width', function(d){ return d.type==='sub'?.5:1; }).merge(linkSel);
  linkSel.exit().remove();

  var nodeSel = gMain.selectAll('.node').data(data.nodes, function(d){ return d.id; });

  var nodeEnter = nodeSel.enter().append('g').attr('class', function(d){ return 'node node-'+d.type+' node-theme-'+d.theme; })
    .call(d3.drag()
      .on('start', function(e,d){ if(!e.active) simulation.alphaTarget(.3).restart(); d.fx=d.x;d.fy=d.y; })
      .on('drag',  function(e,d){ d.fx=e.x;d.fy=e.y; })
      .on('end',   function(e,d){ if(!e.active) simulation.alphaTarget(0); d.fx=null;d.fy=null; })
    )
    .on('click', function(e,d){ e.stopPropagation(); handleClick(d); })
    .on('mouseover', function(e,d){ showTooltip(e,d); })
    .on('mouseout', hideTooltip);

  nodeEnter.append('circle')
    .attr('r', function(d){ return d.type==='center'?52:d.type==='main'?34:20; })
    .attr('fill', function(d){
      if(d.type==='center') return '#00e5a0';
      var t = THEMES[d.theme];
      return d.type==='main' ? t.color+'22' : t.color+'15';
    })
    .attr('stroke', function(d){
      if(d.type==='center') return '#00e5a0';
      return THEMES[d.theme]?THEMES[d.theme].color:'#fff';
    })
    .attr('stroke-width', function(d){ return d.type==='center'?2:d.type==='main'?1.5:.8; })
    .attr('stroke-opacity', function(d){ return d.type==='sub'?.5:1; });

  // Icon
  nodeEnter.filter(function(d){ return d.type==='center'; }).append('text')
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('y',-14).attr('font-size','20px').text('⚠');

  // Labels
  nodeEnter.each(function(d){
    var g = d3.select(this);
    var lines = d.label.split('\n');
    var y0 = d.type==='center'?6:0;
    var dy = d.type==='center'?13:d.type==='main'?12:10;
    var fontSize = d.type==='center'?13:d.type==='main'?11:9;
    var color = d.type==='center'?'#080b0f':d.type==='main'?(THEMES[d.theme]?THEMES[d.theme].color:'#fff'):'rgba(232,234,240,.7)';
    var fontW = d.type==='center'?'700':d.type==='main'?'600':'400';
    var totalH = lines.length*dy;
    var startY = y0 - totalH/2 + dy/2;
    lines.forEach(function(line,i){
      g.append('text')
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y', startY+i*dy)
        .attr('font-size', fontSize+'px')
        .attr('font-family', d.type==='main'?'Syne, sans-serif':'Space Mono, monospace')
        .attr('font-weight', fontW)
        .attr('fill', color)
        .text(line);
    });
  });

  // Expand indicator on main nodes
  nodeEnter.filter(function(d){ return d.type==='main'; }).append('circle')
    .attr('class','expand-dot')
    .attr('r', 5).attr('cx',22).attr('cy',-22)
    .attr('fill', function(d){ return expandedNodes[d.id]?THEMES[d.theme].color:'rgba(255,255,255,.15)'; })
    .attr('stroke', function(d){ return THEMES[d.theme]?THEMES[d.theme].color:'#fff'; })
    .attr('stroke-width',.8);

  var nodeAll = nodeEnter.merge(nodeSel);

  // Update expand dot
  nodeAll.selectAll('.expand-dot')
    .attr('fill', function(d){ return expandedNodes[d.id]?THEMES[d.theme].color:'rgba(255,255,255,.15)'; });

  nodeSel.exit().remove();

  simulation.nodes(data.nodes);
  simulation.force('link').links(data.links);
  simulation.alpha(.5).restart();

  simulation.on('tick', function(){
    gMain.selectAll('.link')
      .attr('x1',function(d){ return d.source.x||0; })
      .attr('y1',function(d){ return d.source.y||0; })
      .attr('x2',function(d){ return d.target.x||0; })
      .attr('y2',function(d){ return d.target.y||0; });
    gMain.selectAll('.node')
      .attr('transform',function(d){ return 'translate('+(d.x||0)+','+(d.y||0)+')'; });
  });
}

function handleClick(d){
  if(d.type==='main'){
    if(expandedNodes[d.id]) delete expandedNodes[d.id];
    else expandedNodes[d.id]=true;
    render();
  }
  openPanel(d);
}

function openPanel(d){
  selectedNode = d;
  var th = d.theme ? THEMES[d.theme] : {color:'#00e5a0', label:'Centre', icon:'⚠'};
  document.getElementById('panel-theme-bar').style.background = th.color;
  document.getElementById('panel-icon').textContent = d.icon || th.icon || '';
  document.getElementById('panel-title').textContent = d.label.replace('\n',' ');
  document.getElementById('panel-subtitle').textContent = d.theme ? th.label : 'Concept central';
  document.getElementById('panel-desc').textContent = d.desc||'';
  var tagsHtml = (d.tags||[]).map(function(t){ return '<span class="ptag">'+t+'</span>'; }).join('');
  document.getElementById('panel-tags').innerHTML = tagsHtml;
  document.getElementById('panel-sources').textContent = 'Source : '+(d.source||'—');
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-close').style.display='flex';
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  setTimeout(function(){ simulation.alpha(.1).restart(); },300);
}

var tooltipEl = document.getElementById('tooltip');
function showTooltip(e,d){
  tooltipEl.textContent = d.label.replace('\n',' ');
  tooltipEl.style.opacity='1';
  tooltipEl.style.left=(e.clientX+12)+'px';
  tooltipEl.style.top=(e.clientY-8)+'px';
}
function hideTooltip(){
  tooltipEl.style.opacity='0';
}

function zoomIn(){
  d3.select('#svg').transition().duration(300).call(zoomBehavior.scaleBy,1.4);
}
function zoomOut(){
  d3.select('#svg').transition().duration(300).call(zoomBehavior.scaleBy,0.7);
}
function resetZoom(){
  d3.select('#svg').transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity.translate(W/2,H/2));
}

svg.on('click',function(){ closePanel(); });
window.addEventListener('resize',function(){
  W=document.getElementById('canvas').offsetWidth;
  H=document.getElementById('canvas').offsetHeight;
});

init();
</script>
</body>
</html>
